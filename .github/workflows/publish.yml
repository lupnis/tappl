name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv and pin CPython 3.14t
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14t"
          enable-cache: true
          cache-python: true

      - name: Sync build environment with uv-managed CPython 3.14t
        run: uv sync --locked --extra dev -p 3.14t

      - name: Validate tag version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          uv run -p 3.14t python - <<'PY'
          from pathlib import Path
          import os
          import re

          version_file = Path("src/tapplayer/_version.py").read_text(encoding="utf-8")
          match = re.search(r'__version__\s*=\s*"([^"]+)"', version_file)
          if not match:
              raise SystemExit("Could not find __version__ in src/tapplayer/_version.py")
          package_version = match.group(1)
          tag_version = os.environ["GITHUB_REF_NAME"].removeprefix("v")
          if package_version != tag_version:
              raise SystemExit(f"Tag version {tag_version!r} does not match package version {package_version!r}")
          print(f"Version check passed: {package_version}")
          PY

      - name: Build distribution
        run: uv run -p 3.14t python -m build

      - name: Check distribution metadata
        run: uv run -p 3.14t python -m twine check dist/*

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/project/tapplayer/

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
