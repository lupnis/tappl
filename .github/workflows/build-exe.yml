name: Build Platform Binaries

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-platform-binary:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform_id: windows
            archive_ext: zip
          - os: ubuntu-latest
            platform_id: linux
            archive_ext: tar.gz
          - os: macos-latest
            platform_id: macos
            archive_ext: tar.gz
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv and pin CPython 3.14t
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14t"
          enable-cache: true
          cache-python: true

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          uv run -p 3.14t --no-project python - <<'PY'
          from pathlib import Path
          import os
          import re

          version_file = Path("src/tapplayer/_version.py").read_text(encoding="utf-8")
          match = re.search(r'__version__\s*=\s*"([^"]+)"', version_file)
          if not match:
              raise SystemExit("Could not find __version__ in src/tapplayer/_version.py")

          version = match.group(1)
          ref_name = os.environ.get("GITHUB_REF_NAME", "")
          if ref_name.startswith("v") and ref_name.removeprefix("v") != version:
              raise SystemExit(
                  f"Tag version {ref_name.removeprefix('v')!r} does not match package version {version!r}"
              )

          platform_id = os.environ["PLATFORM_ID"]
          archive_ext = os.environ["ARCHIVE_EXT"]
          runner_arch = os.environ.get("RUNNER_ARCH", "X64").lower()
          arch = {
              "x64": "x64",
              "arm64": "arm64",
              "x86": "x86",
          }.get(runner_arch, runner_arch)
          suffix = ".zip" if archive_ext == "zip" else ".tar.gz"
          binary_name = "tapplayer.exe" if platform_id == "windows" else "tapplayer"
          asset_name = f"tapplayer-{platform_id}-{arch}-v{version}{suffix}"
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"version={version}\n")
              output.write(f"arch={arch}\n")
              output.write(f"binary_name={binary_name}\n")
              output.write(f"asset_name={asset_name}\n")
          print(f"Resolved version: {version}")
          print(f"Asset name: {asset_name}")
          PY
        env:
          PLATFORM_ID: ${{ matrix.platform_id }}
          ARCHIVE_EXT: ${{ matrix.archive_ext }}
          RUNNER_ARCH: ${{ runner.arch }}

      - name: Sync project with uv-managed CPython 3.14t
        run: uv sync --locked --extra dev -p 3.14t

      - name: Build standalone executable
        run: uv run -p 3.14t --with pyinstaller pyinstaller --noconfirm --clean tap.spec

      - name: Smoke test executable on Windows
        if: matrix.platform_id == 'windows'
        run: .\dist\${{ steps.meta.outputs.binary_name }} --help

      - name: Smoke test executable on Unix
        if: matrix.platform_id != 'windows'
        shell: bash
        run: ./dist/${{ steps.meta.outputs.binary_name }} --help

      - name: Package release archive on Windows
        if: matrix.platform_id == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release | Out-Null
          Copy-Item "dist\${{ steps.meta.outputs.binary_name }}" release\
          Copy-Item README.md release\
          Copy-Item LICENSE release\
          Compress-Archive -Path release\* -DestinationPath "${{ steps.meta.outputs.asset_name }}" -Force

      - name: Package release archive on Unix
        if: matrix.platform_id != 'windows'
        shell: bash
        run: |
          mkdir -p release
          cp "dist/${{ steps.meta.outputs.binary_name }}" release/
          cp README.md release/
          cp LICENSE release/
          tar -C release -czf "${{ steps.meta.outputs.asset_name }}" .

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: platform-binary-${{ matrix.platform_id }}-${{ steps.meta.outputs.arch }}-${{ steps.meta.outputs.version }}
          path: ${{ steps.meta.outputs.asset_name }}

  publish-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-platform-binary
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: platform-binary-*
          path: release-assets
          merge-multiple: true

      - name: Attach binaries to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
